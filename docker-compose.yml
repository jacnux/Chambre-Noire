#version: '3.8'

services:
  # --- BASE DE DONNÉES (PARTAGÉE) ---
  mongo:
    image: mongo:4.4
    container_name: chambrenoire-db
    expose:
      - "27017"
    volumes:
      - ./data/mongo:/data/db
    restart: always
    networks:
      - chambrenoire-network

  # --- BACKEND API (Chambre Noire) ---
  backend:
    build: ./backend
    container_name: chambrenoire-app
    expose:
      - "3000"
    depends_on:
      - mongo
    environment:
      - MONGO_URI=${MONGO_URI}
      - NODE_ENV=${NODE_ENV}
      - CLIENT_URL=${PUBLIC_URL}
      - MAX_FILE_SIZE_MB=${MAX_FILE_SIZE_MB}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_SECURE=${SMTP_SECURE}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - SMTP_FROM=${SMTP_FROM}
      - JWT_SECRET=${JWT_SECRET}
    user: "1000:1000"
    volumes:
      - ./data/uploads:/app/uploads
    command: sh -c "npm run build && npm start"
    restart: always
    networks:
      - chambrenoire-network

  # --- FRONTEND REACT (Chambre Noire Admin) ---
  frontend:
    build:
      context: ./frontend
      args:
        - REACT_APP_API_URL=${REACT_APP_API_URL}
    container_name: chambrenoire-ui
    expose:
      - "80"
    depends_on:
      - backend
    restart: always
    networks:
      - chambrenoire-network

  # --- NGINX PROXY ---
  nginx-proxy:
    image: nginx:alpine
    container_name: chambrenoire-nginx
    ports:
      - "${NGINX_PORT}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - frontend
      - backend
    restart: always
    networks:
      - chambrenoire-network

networks:
  chambrenoire-network:
    driver: bridge
