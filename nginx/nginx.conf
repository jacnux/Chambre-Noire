# specifique au local pour le nginx - pour la prod c'est lt-proxy-letncryt
server {
    listen 80;
    server_name _;

    # --- AUGMENTER LA TAILLE MAX DES FICHIERS ---
    client_max_body_size 100M; 

    # 2. REDIRECTION API PRINCIPALE
    location /api {
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # 3. IMAGES (Servies par Nginx directement pour de hautes performances + Cache)
    location /uploads/ {
        alias /var/www/uploads/;
        access_log off;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # 4. APP PRINCIPALE
    location / {
        proxy_pass http://frontend:80;
        proxy_set_header Host $host;
    }
}

